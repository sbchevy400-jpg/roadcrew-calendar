<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Roadcrew Work Calendar</title>

<style>
body{font-family:Arial;font-size:22px;margin:10px;}
input,select,button{font-size:22px;padding:10px;width:100%;margin:6px 0;}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
}

.day{border:1px solid black;min-height:100px;padding:6px;}
.entry{background:#eef;margin-top:4px;padding:4px;cursor:pointer;}
.hidden{display:none;}
.navbtn{width:48%;display:inline-block;}
</style>
</head>

<body>

<h2>Roadcrew Work Calendar</h2>

<!-- LOGIN -->
<div id="loginBox">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button id="loginBtn">Login</button>
</div>

<div id="app" class="hidden">

<h3>Add / Edit Entry</h3>

<input type="date" id="date">

<select id="worker">
<option>Dump Truck</option>
<option>Motor Grader Deere</option>
<option>Motor Grader Gallion</option>
<option>Backhoe</option>
<option>Brush Cutter</option>
</select>

<input id="hours" type="number" placeholder="Hours">
<input id="location" placeholder="Location Worked">
<input id="workdone" placeholder="Work Performed">
<input id="fema" placeholder="FEMA Number">

<button id="saveBtn">Save Entry</button>

<hr>

<button class="navbtn" id="prevBtn">⬅ Previous</button>
<button class="navbtn" id="nextBtn">Next ➡</button>

<h3 id="monthLabel"></h3>
<div id="calendar" class="calendar"></div>

<hr>

<h3>Monthly Report</h3>
<input type="month" id="reportMonth">
<button id="printBtn">Print Report</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
onSnapshot,
doc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth,
signInWithEmailAndPassword,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCMe7pNLIAaXEfRw3Wd9z5oqbgHTScuVrQ",
  authDomain: "roadcrew-calendar.firebaseapp.com",
  projectId: "roadcrew-calendar",
  storageBucket: "roadcrew-calendar.firebasestorage.app",
  messagingSenderId: "846332597832",
  appId: "1:846332597832:web:795b226fa9d926351a2a7d"
};

const appFirebase=initializeApp(firebaseConfig);
const db=getFirestore(appFirebase);
const auth=getAuth(appFirebase);

const entriesRef=collection(db,"entries");

let currentDate=new Date();
let editingId=null;
let allEntries=[];

/* LOGIN */
document.getElementById("loginBtn").onclick=async()=>{

try{
await signInWithEmailAndPassword(
auth,
email.value,
password.value
);
}catch(err){
alert("Login failed: "+err.message);
}
};

onAuthStateChanged(auth,(user)=>{
if(user){
loginBox.style.display="none";
app.classList.remove("hidden");
listenForUpdates();
}
});

/* SAVE ENTRY */
saveBtn.onclick=async()=>{

const entry={
date:date.value,
worker:worker.value,
hours:Number(hours.value),
location:location.value,
work:workdone.value,
fema:fema.value
};

if(editingId){
await updateDoc(doc(db,"entries",editingId),entry);
editingId=null;
}else{
await addDoc(entriesRef,entry);
}

alert("Saved");
};

/* LIVE SYNC */
function listenForUpdates(){

onSnapshot(entriesRef,(snapshot)=>{

allEntries=[];
snapshot.forEach(d=>{
allEntries.push({id:d.id,...d.data()});
});

buildCalendar();
});
}

/* MONTH NAV */
prevBtn.onclick=()=>{currentDate.setMonth(currentDate.getMonth()-1);buildCalendar();}
nextBtn.onclick=()=>{currentDate.setMonth(currentDate.getMonth()+1);buildCalendar();}

/* CALENDAR */
function buildCalendar(){

calendar.innerHTML="";

const year=currentDate.getFullYear();
const month=currentDate.getMonth();

monthLabel.innerText=currentDate.toLocaleString('default',{month:'long',year:'numeric'});

const firstDay=new Date(year,month,1).getDay();
const days=new Date(year,month+1,0).getDate();

for(let i=0;i<firstDay;i++) calendar.innerHTML+="<div></div>";

for(let d=1;d<=days;d++){

const dateStr=`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;

let html=`<div class="day"><strong>${d}</strong>`;

allEntries.forEach(e=>{
if(e.date===dateStr){
html+=`<div class="entry" onclick="editEntry('${e.id}')">
${e.worker} (${e.hours}h)
</div>`;
}
});

html+="</div>";
calendar.innerHTML+=html;
}
}

window.editEntry=(id)=>{
const e=allEntries.find(x=>x.id===id);
date.value=e.date;
worker.value=e.worker;
hours.value=e.hours;
location.value=e.location||"";
workdone.value=e.work||"";
fema.value=e.fema||"";
editingId=id;
window.scrollTo(0,0);
};

/* REPORT */
printBtn.onclick=()=>{

const month=reportMonth.value;
if(!month){alert("Select month");return;}

const entries=allEntries.filter(e=>e.date.startsWith(month));

let w=window.open("","","width=900,height=700");

w.document.write(`<h2>Monthly Report ${month}</h2>`);

entries.sort((a,b)=>a.date.localeCompare(b.date));

entries.forEach(e=>{
w.document.write(`
<p>
<strong>${e.date}</strong><br>
${e.worker}<br>
Hours: ${e.hours}<br>
Location: ${e.location||""}<br>
Work: ${e.work||""}<br>
FEMA: ${e.fema||"N/A"}
</p><hr>
`);
});

w.document.close();
w.print();
};

</script>
</body>
</html>
