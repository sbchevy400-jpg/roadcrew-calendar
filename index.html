<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Roadcrew Work Calendar</title>

<style>
body{
font-family:Arial;
background:#f4f6f8;
text-align:center;
padding:20px;
}
select,input{
display:block;
margin:8px auto;
padding:10px;
width:90%;
max-width:320px;
}
button{
padding:12px;
background:#2c3e50;
color:white;
border:none;
border-radius:6px;
}
.entry{
background:white;
margin:10px auto;
padding:10px;
border-radius:8px;
max-width:350px;
}
.totals{
background:#ffffff;
margin:15px auto;
padding:12px;
border-radius:8px;
max-width:350px;
font-weight:bold;
}
</style>
</head>

<body>

<h2>Ozark Township Roadcrew Calendar</h2>

<select id="worker">
<option value="">Select Equipment</option>
<option>Dump Truck</option>
<option>Motor Grader Deere</option>
<option>Motor Grader Gallion</option>
<option>Backhoe</option>
<option>Brush Cutter</option>
</select>

<input id="hours" type="number" placeholder="Hours Worked">
<input id="location" placeholder="Work Location">
<input id="workdone" placeholder="Work Completed">
<input id="fema" placeholder="FEMA Number">
<input id="date" type="date">

<button id="saveBtn">Save Work Entry</button>

<div class="totals" id="totalsBox"></div>

<div id="entries"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
onSnapshot,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyArv5V1_8ZQoN3fe3OJ35Fl-7PbEKzkDYo",
authDomain: "roadcrew-work-calendar.firebaseapp.com",
projectId: "roadcrew-work-calendar",
storageBucket: "roadcrew-work-calendar.firebasestorage.app",
messagingSenderId: "373087389663",
appId: "1:373087389663:web:a55368e82fcd1942ade66a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById("saveBtn").onclick = async () => {

const worker = document.getElementById("worker").value;

if(!worker){
alert("Select equipment first");
return;
}

await addDoc(collection(db,"work"),{
worker:worker,
hours:Number(document.getElementById("hours").value || 0),
location:document.getElementById("location").value,
work:document.getElementById("workdone").value,
fema:document.getElementById("fema").value,
date:document.getElementById("date").value,
created:Date.now()
});

};

const q = query(collection(db,"work"), orderBy("created","desc"));

onSnapshot(q,(snapshot)=>{

const entries = document.getElementById("entries");
entries.innerHTML="";

let equipmentTotals = {
"Dump Truck":0,
"Motor Grader Deere":0,
"Motor Grader Gallion":0,
"Backhoe":0,
"Brush Cutter":0
};

let femaTotals = {};
let totalFemaHours = 0;

snapshot.forEach(doc=>{
const d = doc.data();
const hrs = Number(d.hours || 0);

// Equipment totals
if(equipmentTotals[d.worker] !== undefined){
equipmentTotals[d.worker] += hrs;
}

// FEMA totals
if(d.fema && d.fema.trim() !== ""){
totalFemaHours += hrs;

if(!femaTotals[d.fema]){
femaTotals[d.fema] = 0;
}
femaTotals[d.fema] += hrs;
}

entries.innerHTML += `
<div class="entry">
<b>${d.worker}</b><br>
${d.date} — ${d.hours} hrs<br>
${d.location}<br>
${d.work}<br>
FEMA: ${d.fema}
</div>`;
});

// FEMA breakdown display
let femaHTML = "";
for(const num in femaTotals){
femaHTML += `${num}: ${femaTotals[num]} hrs<br>`;
}

document.getElementById("totalsBox").innerHTML = `
<b>Equipment Totals</b><br><br>
Dump Truck: ${equipmentTotals["Dump Truck"]} hrs<br>
Motor Grader Deere: ${equipmentTotals["Motor Grader Deere"]} hrs<br>
Motor Grader Gallion: ${equipmentTotals["Motor Grader Gallion"]} hrs<br>
Backhoe: ${equipmentTotals["Backhoe"]} hrs<br>
Brush Cutter: ${equipmentTotals["Brush Cutter"]} hrs
<br><br>
<b>FEMA Totals</b><br>
Total FEMA Hours: ${totalFemaHours} hrs
<br><br>
<b>FEMA Breakdown</b><br>
${femaHTML || "No FEMA work logged"}
`;

});

</script>

</body>
</html>
