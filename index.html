<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Roadcrew Work Calendar</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,collection,addDoc,query,orderBy,onSnapshot,
deleteDoc,doc,updateDoc,getDocs,enableIndexedDbPersistence
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* FIREBASE */
const firebaseConfig={
apiKey:"AIzaSyArv5V1_8ZQoN3fe3OJ35Fl-7PbEKzkDYo",
authDomain:"roadcrew-work-calendar.firebaseapp.com",
projectId:"roadcrew-work-calendar"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);

enableIndexedDbPersistence(db).catch(()=>{});

const ADMIN_EMAILS=[
"sbchevy400@gmail.com",
"kimber0270@gmail.com"
];

let isAdmin=false;

/* LOGIN */
window.login=async()=>{
await signInWithEmailAndPassword(
auth,
loginEmail.value,
loginPassword.value
);
};

window.logout=()=>signOut(auth);

/* AUTH STATE */
onAuthStateChanged(auth,(user)=>{

if(user){
loginScreen.style.display="none";
appScreen.style.display="block";

isAdmin=ADMIN_EMAILS.includes(user.email);

if(!isAdmin){
adminOnly.style.display="none";
}

startApp();

}else{
loginScreen.style.display="block";
appScreen.style.display="none";
}
});

/* START APP AFTER LOGIN */
function startApp(){

const workRef=collection(db,"work");

const q=query(workRef,orderBy("date","asc"));

onSnapshot(q,(snapshot)=>{

entries.innerHTML="";
calendar.innerHTML="";

let days={};

snapshot.forEach(d=>{

const data=d.data();
const id=d.id;

if(!days[data.date]) days[data.date]=[];
days[data.date].push(data);

/* entries */
entries.innerHTML+=`
<div class="card">
<b>${data.worker}</b><br>
${data.date} — ${data.hours} hrs<br>
${data.location}<br>
${data.work}<br>
FEMA: ${data.fema||"-"}<br><br>

${isAdmin?`
<button onclick='deleteEntry("${id}")'>Delete</button>
`:``}
</div>`;
});

/* calendar */
Object.keys(days).sort().forEach(day=>{
calendar.innerHTML+=`
<div class="dayBlock">
<h3>${day}</h3>
${days[day].map(e=>`
<div class="calEntry">
${e.worker}<br>${e.hours} hrs
</div>`).join("")}
</div>`;
});

});

/* ADD ENTRY */
window.addEntry=async()=>{
await addDoc(workRef,{
date:date.value,
worker:worker.value,
hours:Number(hours.value),
location:location.value,
work:workdone.value,
fema:fema.value
});
};

/* DELETE (ADMIN ONLY) */
window.deleteEntry=async(id)=>{
if(!isAdmin) return;
await deleteDoc(doc(db,"work",id));
};

/* PRINT REPORT (ADMIN ONLY) */
window.printMonthlyReport=async()=>{

if(!isAdmin) return;

const month=prompt("Enter month YYYY-MM");
if(!month)return;

const snap=await getDocs(workRef);

let html="<h1>Monthly Report "+month+"</h1>";

snap.forEach(d=>{
const data=d.data();
if(data.date.startsWith(month)){
html+=`${data.date} - ${data.worker} - ${data.hours} hrs<br>`;
}
});

const win=window.open("");
win.document.write(html);
win.print();
};

}

</script>

<style>

body{
font-family:Arial;
background:#f4f6f8;
margin:15px;
font-size:22px;
}

input,select,button{
width:100%;
padding:18px;
margin:10px 0;
font-size:22px;
}

.card,.dayBlock{
background:white;
padding:15px;
margin:12px 0;
border-radius:12px;
}

.calEntry{
background:#e9f2ff;
margin:6px 0;
padding:10px;
border-radius:8px;
}

</style>

</head>

<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">

<h2>Roadcrew Login</h2>

<input id="loginEmail" placeholder="Email">
<input id="loginPassword" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<!-- APP -->
<div id="appScreen" style="display:none">

<button onclick="logout()">Logout</button>

<h2>Roadcrew Work Calendar</h2>

<input type="date" id="date">

<select id="worker">
<option>Dump Truck</option>
<option>Motor Grader Deere</option>
<option>Motor Grader Gallion</option>
<option>Backhoe</option>
<option>Brush Cutter</option>
</select>

<input id="hours" placeholder="Hours">
<input id="location" placeholder="Location">
<input id="workdone" placeholder="Work">
<input id="fema" placeholder="FEMA Number">

<button onclick="addEntry()">Add Entry</button>

<div id="adminOnly">
<button onclick="printMonthlyReport()">Print Monthly Report</button>
</div>

<h3>Calendar</h3>
<div id="calendar"></div>

<h3>Entries</h3>
<div id="entries"></div>

</div>

</body>
</html>
