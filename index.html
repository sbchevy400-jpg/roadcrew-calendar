<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Roadcrew Work Calendar</title>

<style>
body{
  font-family:Arial;
  max-width:900px;
  margin:auto;
  padding:15px;
  font-size:22px;
}

input,select,button{
  width:100%;
  padding:18px;
  margin:8px 0;
  font-size:22px;
}

.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  margin-top:15px;
}

.day{
  border:2px solid #ccc;
  min-height:90px;
  padding:6px;
  border-radius:8px;
  cursor:pointer;
}

.selected{
  background:#cfe8ff;
}

.entry{
  border-top:1px solid #aaa;
  margin-top:5px;
  padding-top:5px;
  font-size:18px;
}
</style>
</head>

<body>

<div id="app"></div>

<script type="module">

import { initializeApp } from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  deleteDoc,
  doc
} from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ================= FIREBASE ================= */

const firebaseConfig={
  apiKey:"AIzaSyArv5V1_8ZQoN3fe3OJ35Fl-7PbEKzkDYo",
  authDomain:"roadcrew-work-calendar.firebaseapp.com",
  projectId:"roadcrew-work-calendar"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

/* ================= USERS ================= */

const ADMINS=[
"sbchevy400@gmail.com",
"kimber0270@gmail.com",
"ndmorrison71@gmail.com"
];

const USERS={
"sbchevy400@gmail.com":"admin123",
"kimber0270@gmail.com":"admin123",
"ndmorrison71@gmail.com":"admin123",
worker1:"crew123",
worker2:"crew123",
worker3:"crew123"
};

const WORKERS=[
"Dump Truck",
"Motor Grader Deere",
"Motor Grader Gallion",
"Backhoe",
"Brush Cutter"
];

let currentUser=localStorage.getItem("user");
const appDiv=document.getElementById("app");

let allEntries=[];
let selectedDate=null;

/* ================= LOGIN ================= */

function renderLogin(){
appDiv.innerHTML=`
<h1>Roadcrew Work Calendar</h1>

<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password" placeholder="Password">

<button id="loginBtn">Login</button>
`;

document.getElementById("loginBtn").onclick=()=>{
const u=document.getElementById("loginUser").value;
const p=document.getElementById("loginPass").value;

if(USERS[u]===p){
localStorage.setItem("user",u);
location.reload();
}else alert("Invalid login");
};
}

function logout(){
localStorage.removeItem("user");
location.reload();
}

/* ================= CALENDAR ================= */

function buildCalendar(){

const now=new Date();
const year=now.getFullYear();
const month=now.getMonth();

const last=new Date(year,month+1,0);

let html="<div class='calendar'>";

for(let i=1;i<=last.getDate();i++){

const dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;

const dayEntries=allEntries.filter(e=>e.date===dateStr);

html+=`
<div class="day ${selectedDate===dateStr?'selected':''}"
data-date="${dateStr}">
<b>${i}</b>
${dayEntries.map(e=>`<div class="entry">${e.worker} (${e.hours})</div>`).join("")}
</div>`;
}

html+="</div>";

return html;
}

/* ================= MAIN APP ================= */

function renderApp(){

appDiv.innerHTML=`
<h1>Roadcrew Work Calendar</h1>
<button id="logoutBtn">Logout</button>

${buildCalendar()}

<h2>Add Entry</h2>

<input type="date" id="dateInput" value="${selectedDate||""}">

<select id="workerInput">
${WORKERS.map(w=>`<option>${w}</option>`).join("")}
</select>

<input id="hoursInput" placeholder="Hours">
<input id="locationInput" placeholder="Location">
<input id="workInput" placeholder="Work Performed">
<input id="femaInput" placeholder="FEMA Number">

<button id="saveBtn">Save Entry</button>

<button onclick="window.print()">Print Monthly Report</button>

<div id="dayEntries"></div>
`;

document.getElementById("logoutBtn").onclick=logout;

/* select day */
document.querySelectorAll(".day").forEach(d=>{
d.onclick=()=>{
selectedDate=d.dataset.date;
renderApp();
};
});

/* SAVE ENTRY — FIXED */
document.getElementById("saveBtn").onclick=addEntry;

renderSelectedEntries();
}

/* ================= SAVE ENTRY ================= */

async function addEntry(){

const entry={
date:document.getElementById("dateInput").value,
worker:document.getElementById("workerInput").value,
hours:document.getElementById("hoursInput").value,
location:document.getElementById("locationInput").value,
work:document.getElementById("workInput").value,
fema:document.getElementById("femaInput").value
};

if(!entry.date||!entry.hours){
alert("Date and hours required");
return;
}

await addDoc(collection(db,"entries"),entry);
}

/* ================= SHOW DAY ================= */

function renderSelectedEntries(){

if(!selectedDate) return;

const list=allEntries.filter(e=>e.date===selectedDate);

document.getElementById("dayEntries").innerHTML=
list.map(e=>`
<div class="entry">
${e.worker} — ${e.hours} hrs<br>
${e.location}<br>
${e.work}<br>
FEMA: ${e.fema||"-"}
${
ADMINS.includes(currentUser)
? `<br><button onclick="deleteEntry('${e.id}')">Delete</button>`
:""
}
</div>
`).join("");
}

window.deleteEntry=async(id)=>{
await deleteDoc(doc(db,"entries",id));
};

/* ================= FIRESTORE LIVE SYNC ================= */

onSnapshot(collection(db,"entries"),snap=>{
allEntries=snap.docs.map(d=>({id:d.id,...d.data()}));
renderApp();
});

/* ================= START ================= */

if(!currentUser) renderLogin();
else renderApp();

</script>

</body>
</html>
