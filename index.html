<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Roadcrew Work Calendar</title>

<style>
body{
font-family:Arial;
font-size:22px;
margin:10px;
}

input,select,button{
font-size:22px;
padding:10px;
margin:6px 0;
width:100%;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
}

.day{
border:1px solid #333;
min-height:90px;
padding:6px;
cursor:pointer;
}

.day strong{
display:block;
font-size:26px;
}

.entry{
font-size:18px;
margin-top:4px;
}

.hidden{display:none;}
</style>
</head>

<body>

<h2>Roadcrew Work Calendar</h2>

<!-- LOGIN -->
<div id="login">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<h3>Add Work Entry</h3>

<input type="date" id="date">

<select id="worker">
<option>Dump Truck</option>
<option>Motor Grader Deere</option>
<option>Motor Grader Gallion</option>
<option>Backhoe</option>
<option>Brush Cutter</option>
</select>

<input id="hours" type="number" placeholder="Hours Worked">
<input id="location" placeholder="Location Worked">
<input id="workdone" placeholder="Work Performed">
<input id="fema" placeholder="FEMA Number (optional)">

<button onclick="saveEntry()">Save Entry</button>

<hr>

<h3>Calendar</h3>
<div id="calendar" class="calendar"></div>

<hr>

<h3>Monthly Report</h3>

<input type="month" id="reportMonth">
<button onclick="printReport()">Print Monthly Report</button>

</div>

<script>
const admins=[
"sbchevy400@gmail.com",
"kimber0270@gmail.com",
"ndmorrison71@gmail.com"
];

function login(){
let email=document.getElementById("email").value;
if(admins.includes(email)){
document.getElementById("login").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");
buildCalendar();
}else{
alert("Access denied");
}
}

function getEntries(){
return JSON.parse(localStorage.getItem("entries")||"[]");
}

function saveEntries(data){
localStorage.setItem("entries",JSON.stringify(data));
}

function saveEntry(){

const entry={
date:date.value,
worker:worker.value,
hours:Number(hours.value),
location:location.value,
work:workdone.value,
fema:fema.value
};

let entries=getEntries();
entries.push(entry);
saveEntries(entries);

alert("Saved!");
buildCalendar();
}

function buildCalendar(){

const cal=document.getElementById("calendar");
cal.innerHTML="";

const today=new Date();
const year=today.getFullYear();
const month=today.getMonth();

const firstDay=new Date(year,month,1).getDay();
const days=new Date(year,month+1,0).getDate();

for(let i=0;i<firstDay;i++){
cal.innerHTML+="<div></div>";
}

const entries=getEntries();

for(let d=1;d<=days;d++){

const dateStr=`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;

const dayEntries=entries.filter(e=>e.date===dateStr);

let html=`<div class="day"><strong>${d}</strong>`;

dayEntries.forEach(e=>{
html+=`<div class="entry">${e.worker} (${e.hours}h)</div>`;
});

html+="</div>";
cal.innerHTML+=html;
}
}

function printReport(){

const monthValue=document.getElementById("reportMonth").value;

if(!monthValue){
alert("Select a month first");
return;
}

const entries=getEntries().filter(e=>e.date.startsWith(monthValue));

let femaTotals={};
let dailyTotals={};

entries.forEach(e=>{
if(!dailyTotals[e.date]) dailyTotals[e.date]=[];
dailyTotals[e.date].push(e);

if(e.fema){
if(!femaTotals[e.fema]) femaTotals[e.fema]=0;
femaTotals[e.fema]+=e.hours;
}
});

let report=window.open("","","width=900,height=700");

report.document.write(`<h2>Roadcrew Monthly Report - ${monthValue}</h2>`);

Object.keys(dailyTotals).sort().forEach(date=>{

report.document.write(`<h3>${date}</h3>`);

dailyTotals[date].forEach(e=>{
report.document.write(`
<p>
<strong>${e.worker}</strong><br>
Hours: ${e.hours}<br>
Location: ${e.location}<br>
Work Performed: ${e.work}<br>
FEMA #: ${e.fema||"N/A"}
</p>
<hr>
`);
});

});

report.document.write("<h2>FEMA Totals</h2>");

Object.keys(femaTotals).forEach(f=>{
report.document.write(`<p>FEMA ${f}: ${femaTotals[f]} hours</p>`);
});

report.document.close();
report.print();
}
</script>

</body>
</html>
