<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Roadcrew Work Calendar</title>

<style>
body{font-family:Arial;font-size:22px;margin:10px;}
input,select,button{font-size:22px;padding:10px;width:100%;margin:6px 0;}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
}

.day{
border:1px solid black;
min-height:100px;
padding:6px;
}

.entry{
background:#eef;
margin-top:4px;
padding:4px;
cursor:pointer;
}

.hidden{display:none;}
.navbtn{width:48%;display:inline-block;}
</style>
</head>

<body>

<h2>Roadcrew Work Calendar</h2>

<!-- LOGIN -->
<div id="login">
<input id="email" placeholder="Email">
<button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<h3>Add / Edit Entry</h3>

<input type="date" id="date">

<select id="worker">
<option>Dump Truck</option>
<option>Motor Grader Deere</option>
<option>Motor Grader Gallion</option>
<option>Backhoe</option>
<option>Brush Cutter</option>
</select>

<input id="hours" type="number" placeholder="Hours">
<input id="location" placeholder="Location Worked">
<input id="workdone" placeholder="Work Performed">
<input id="fema" placeholder="FEMA Number">

<button onclick="saveEntry()">Save Entry</button>

<hr>

<button class="navbtn" onclick="changeMonth(-1)">⬅ Previous</button>
<button class="navbtn" onclick="changeMonth(1)">Next ➡</button>

<h3 id="monthLabel"></h3>
<div id="calendar" class="calendar"></div>

<hr>

<h3>Monthly Report</h3>
<input type="month" id="reportMonth">
<button onclick="printReport()">Print Report</button>

</div>

<script>

const admins=[
"sbchevy400@gmail.com",
"kimber0270@gmail.com",
"ndmorrison71@gmail.com"
];

let currentDate=new Date();
let editingIndex=null;

function login(){
if(admins.includes(email.value)){
login.style.display="none";
app.classList.remove("hidden");
buildCalendar();
}else alert("Access denied");
}

function getEntries(){
return JSON.parse(localStorage.getItem("entries")||"[]");
}

function saveEntries(e){
localStorage.setItem("entries",JSON.stringify(e));
}

function saveEntry(){

let entries=getEntries();

const entry={
date:date.value,
worker:worker.value,
hours:Number(hours.value),
location:location.value,
work:workdone.value,
fema:fema.value
};

if(editingIndex!==null){
entries[editingIndex]=entry;
editingIndex=null;
}else{
entries.push(entry);
}

saveEntries(entries);
alert("Saved");
buildCalendar();
}

function changeMonth(dir){
currentDate.setMonth(currentDate.getMonth()+dir);
buildCalendar();
}

function buildCalendar(){

const cal=document.getElementById("calendar");
cal.innerHTML="";

const year=currentDate.getFullYear();
const month=currentDate.getMonth();

monthLabel.innerText=currentDate.toLocaleString('default',{month:'long',year:'numeric'});

const firstDay=new Date(year,month,1).getDay();
const days=new Date(year,month+1,0).getDate();

for(let i=0;i<firstDay;i++) cal.innerHTML+="<div></div>";

const entries=getEntries();

for(let d=1;d<=days;d++){

const dateStr=`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;

let html=`<div class="day"><strong>${d}</strong>`;

entries.forEach((e,index)=>{
if(e.date===dateStr){

html+=`
<div class="entry" onclick="editEntry(${index})">
${e.worker} (${e.hours}h)
</div>`;
}
});

html+="</div>";
cal.innerHTML+=html;
}
}

function editEntry(index){

const e=getEntries()[index];

date.value=e.date;
worker.value=e.worker;
hours.value=e.hours;
location.value=e.location || "";
workdone.value=e.work || "";
fema.value=e.fema || "";

editingIndex=index;
window.scrollTo(0,0);
}

function printReport(){

const month=document.getElementById("reportMonth").value;
if(!month){alert("Select month");return;}

const entries=getEntries().filter(e=>e.date.startsWith(month));

let femaTotals={};
let daily={};

entries.forEach(e=>{

if(!daily[e.date]) daily[e.date]=[];
daily[e.date].push(e);

if(e.fema){
if(!femaTotals[e.fema]) femaTotals[e.fema]=0;
femaTotals[e.fema]+=Number(e.hours)||0;
}
});

let w=window.open("","","width=900,height=700");

w.document.write(`<h2>Monthly Report ${month}</h2>`);

Object.keys(daily).sort().forEach(date=>{

w.document.write(`<h3>${date}</h3>`);

daily[date].forEach(e=>{
w.document.write(`
<p>
<strong>${e.worker}</strong><br>
Hours: ${e.hours}<br>
Location: ${e.location || ""}<br>
Work Performed: ${e.work || ""}<br>
FEMA #: ${e.fema || "N/A"}
</p><hr>
`);
});

});

w.document.write("<h2>FEMA Totals</h2>");

Object.keys(femaTotals).forEach(f=>{
w.document.write(`<p>${f}: ${femaTotals[f]} hours</p>`);
});

w.document.close();
w.print();
}

</script>
</body>
</html>
