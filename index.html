<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="manifest" href="manifest.json">

<title>Roadcrew Work Calendar</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
query,
orderBy,
onSnapshot,
deleteDoc,
doc,
updateDoc,
getDocs,
enableIndexedDbPersistence
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
apiKey:"AIzaSyArv5V1_8ZQoN3fe3OJ35Fl-7PbEKzkDYo",
authDomain:"roadcrew-work-calendar.firebaseapp.com",
projectId:"roadcrew-work-calendar",
storageBucket:"roadcrew-work-calendar.firebasestorage.app",
messagingSenderId:"373087389663",
appId:"1:373087389663:web:a55368e82fcd1942ade66a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

enableIndexedDbPersistence(db).catch(()=>{});

const workRef = collection(db,"work");

/* GET PAGE ELEMENTS (FIXED SAVE ISSUE) */
const date = document.getElementById("date");
const worker = document.getElementById("worker");
const hours = document.getElementById("hours");
const location = document.getElementById("location");
const workdone = document.getElementById("workdone");
const fema = document.getElementById("fema");

const entries = document.getElementById("entries");
const calendar = document.getElementById("calendar");
const totals = document.getElementById("totals");
const installBtn = document.getElementById("installBtn");

/* ADD ENTRY */
window.addEntry = async ()=>{
await addDoc(workRef,{
date:date.value,
worker:worker.value,
hours:Number(hours.value),
location:location.value,
work:workdone.value,
fema:fema.value
});
};

/* DELETE ENTRY */
window.deleteEntry = async(id)=>{
if(confirm("Delete entry?")){
await deleteDoc(doc(db,"work",id));
}
};

/* EDIT ENTRY */
window.editEntry = async(id,data)=>{
const hrs = prompt("Edit hours",data.hours);
if(hrs===null) return;

await updateDoc(doc(db,"work",id),{
hours:Number(hrs)
});
};

/* LIVE DATA LISTENER */
const q=query(workRef,orderBy("date","desc"));

onSnapshot(q,(snapshot)=>{

entries.innerHTML="";
calendar.innerHTML="";

let equipTotals={
"Dump Truck":0,
"Motor Grader Deere":0,
"Motor Grader Gallion":0,
"Backhoe":0,
"Brush Cutter":0
};

let femaTotals={};
let totalFema=0;

snapshot.forEach(d=>{

const data=d.data();
const id=d.id;
const hrs=Number(data.hours||0);

/* totals */
if(equipTotals[data.worker]!=undefined)
equipTotals[data.worker]+=hrs;

if(data.fema){
totalFema+=hrs;
femaTotals[data.fema]=(femaTotals[data.fema]||0)+hrs;
}

/* entry card */
entries.innerHTML+=`
<div class="card">
<b>${data.worker}</b><br>
${data.date} — ${hrs} hrs<br>
${data.location}<br>
${data.work}<br>
FEMA: ${data.fema||"-"}<br><br>

<button onclick='editEntry("${id}",${JSON.stringify(data)})'>Edit</button>
<button onclick='deleteEntry("${id}")'>Delete</button>
</div>`;

/* calendar view */
calendar.innerHTML+=`
<div class="cal">
<b>${data.date}</b><br>
${data.worker}<br>
${hrs} hrs
</div>`;
});

/* totals display */
let femaHTML="";
for(const n in femaTotals){
femaHTML+=`${n}: ${femaTotals[n]} hrs<br>`;
}

totals.innerHTML=`
<h3>Equipment Totals</h3>
${Object.entries(equipTotals).map(e=>`${e[0]}: ${e[1]} hrs`).join("<br>")}
<br><br>

<h3>FEMA Totals</h3>
Total FEMA Hours: ${totalFema} hrs<br><br>

<h3>FEMA Breakdown</h3>
${femaHTML||"None"}
`;

});

/* MONTHLY FEMA REPORT */
window.monthlyReport=()=>{
const m = prompt("Enter month (YYYY-MM)");
if(!m) return;

const cards=document.querySelectorAll(".card");
let report="FEMA Monthly Report\n\n";

cards.forEach(c=>{
if(c.innerText.includes(m))
report+=c.innerText+"\n\n";
});

const blob=new Blob([report],{type:"text/plain"});
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="FEMA_Report_"+m+".txt";
a.click();
};

/* BACKUP */
window.backupData = async()=>{
const snap=await getDocs(workRef);
let data=[];
snap.forEach(d=>data.push(d.data()));

const blob=new Blob([JSON.stringify(data)],{type:"application/json"});
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="roadcrew_backup.json";
a.click();
};

/* RESTORE */
window.restoreData = async(e)=>{
const file=e.target.files[0];
const text=await file.text();
const data=JSON.parse(text);

for(const item of data){
await addDoc(workRef,item);
}

alert("Restore complete");
};

/* INSTALL APP */
let deferredPrompt;

window.addEventListener("beforeinstallprompt",(e)=>{
e.preventDefault();
deferredPrompt=e;
installBtn.style.display="block";
});

window.installApp=()=>{
deferredPrompt.prompt();
};

if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js");
}

</script>

<style>
body{font-family:Arial;background:#f4f6f8;margin:15px}
input,select,button{width:100%;padding:10px;margin:5px 0}
button{background:#2c7be5;color:white;border:none;border-radius:6px}
.card{background:white;padding:10px;margin:8px 0;border-radius:8px}
.cal{display:inline-block;width:30%;background:white;margin:5px;padding:8px;text-align:center}
</style>

</head>

<body>

<h2>Roadcrew Work Calendar</h2>

<input type="date" id="date">

<select id="worker">
<option>Dump Truck</option>
<option>Motor Grader Deere</option>
<option>Motor Grader Gallion</option>
<option>Backhoe</option>
<option>Brush Cutter</option>
</select>

<input id="hours" placeholder="Hours Worked">
<input id="location" placeholder="Location">
<input id="workdone" placeholder="Work Performed">
<input id="fema" placeholder="FEMA Number">

<button onclick="addEntry()">Add Entry</button>
<button onclick="monthlyReport()">Monthly FEMA Report</button>
<button onclick="backupData()">Backup Data</button>

<input type="file" onchange="restoreData(event)">

<button id="installBtn" onclick="installApp()" style="display:none">
Install App
</button>

<h3>Calendar</h3>
<div id="calendar"></div>

<h3>Entries</h3>
<div id="entries"></div>

<div id="totals"></div>

</body>
</html>
