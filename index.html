<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Roadcrew Work Calendar</title>

<style>
body{
  font-family: Arial, sans-serif;
  padding:20px;
  max-width:700px;
  margin:auto;
  font-size:22px;
}

input, select, button{
  width:100%;
  padding:18px;
  margin:10px 0;
  font-size:22px;
}

.card{
  border:2px solid #ccc;
  border-radius:10px;
  padding:15px;
  margin-top:12px;
}
</style>
</head>

<body>

<div id="app"></div>

<script type="module">

/* ================= FIREBASE ================= */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyArv5V1_8ZQoN3fe3OJ35Fl-7PbEKzkDYo",
  authDomain: "roadcrew-work-calendar.firebaseapp.com",
  projectId: "roadcrew-work-calendar",
  storageBucket: "roadcrew-work-calendar.firebasestorage.app",
  messagingSenderId: "373087389663",
  appId: "1:373087389663:web:a55368e82fcd1942ade66a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= USERS ================= */

const ADMINS = [
  "sbchevy400@gmail.com",
  "kimber0270@gmail.com",
  "ndmorrison71@gmail.com"
];

const USERS = {
  "sbchevy400@gmail.com": "admin123",
  "kimber0270@gmail.com": "admin123",
  "ndmorrison71@gmail.com": "admin123",
  worker1: "crew123",
  worker2: "crew123",
  worker3: "crew123"
};

/* ================= EQUIPMENT ================= */

const WORKERS = [
  "Dump Truck",
  "Motor Grader Deere",
  "Motor Grader Gallion",
  "Backhoe",
  "Brush Cutter"
];

/* ================= LOGIN ================= */

let currentUser = localStorage.getItem("user");
const appDiv = document.getElementById("app");

function renderLogin(){
  appDiv.innerHTML = `
    <h1>Roadcrew Work Calendar</h1>

    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
  `;
}

window.login = () => {
  const u = username.value;
  const p = password.value;

  if(USERS[u] === p){
    localStorage.setItem("user",u);
    location.reload();
  } else {
    alert("Invalid login");
  }
};

window.logout = () => {
  localStorage.removeItem("user");
  location.reload();
};

/* ================= MAIN APP ================= */

function renderApp(){

  appDiv.innerHTML = `
    <h1>Roadcrew Work Calendar</h1>

    <button onclick="logout()">Logout</button>

    <h2>Add Entry</h2>

    <input type="date" id="date">

    <select id="worker">
      ${WORKERS.map(w=>`<option>${w}</option>`).join("")}
    </select>

    <input id="hours" placeholder="Hours Worked">
    <input id="location" placeholder="Location">
    <input id="work" placeholder="Work Performed">
    <input id="fema" placeholder="FEMA Number">

    <button onclick="addEntry()">Save Entry</button>

    <button onclick="window.print()">Print Monthly Report (PDF)</button>

    <h2>Calendar Entries</h2>
    <div id="entries"></div>
  `;

  listenEntries();
}

/* ================= FIRESTORE ================= */

window.addEntry = async () => {

  const entry = {
    date: date.value,
    worker: worker.value,
    hours: hours.value,
    location: location.value,
    work: work.value,
    fema: fema.value
  };

  if(!entry.date || !entry.hours){
    alert("Date and Hours required");
    return;
  }

  await addDoc(collection(db,"entries"), entry);

  date.value="";
  hours.value="";
  location.value="";
  work.value="";
  fema.value="";
};

function listenEntries(){

  onSnapshot(collection(db,"entries"), snap => {

    const entries = snap.docs.map(d=>({id:d.id,...d.data()}))
      .sort((a,b)=> new Date(a.date)-new Date(b.date));

    document.getElementById("entries").innerHTML =
      entries.map(e=>`
        <div class="card">
          <b>${e.date}</b><br>
          ${e.worker}<br>
          ${e.hours} hrs<br>
          ${e.location}<br>
          ${e.work}<br>
          FEMA: ${e.fema || "-"}
          ${
            ADMINS.includes(currentUser)
            ? `<br><button onclick="deleteEntry('${e.id}')">Delete</button>`
            : ""
          }
        </div>
      `).join("");
  });
}

window.deleteEntry = async(id)=>{
  await deleteDoc(doc(db,"entries",id));
};

/* ================= START ================= */

if(!currentUser){
  renderLogin();
}else{
  renderApp();
}

</script>

</body>
</html>
