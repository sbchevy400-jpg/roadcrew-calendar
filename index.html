<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="manifest" href="manifest.json">

<title>Roadcrew Work Calendar</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
query,
orderBy,
onSnapshot,
deleteDoc,
doc,
updateDoc,
getDocs,
enableIndexedDbPersistence
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig={
apiKey:"AIzaSyArv5V1_8ZQoN3fe3OJ35Fl-7PbEKzkDYo",
authDomain:"roadcrew-work-calendar.firebaseapp.com",
projectId:"roadcrew-work-calendar"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

enableIndexedDbPersistence(db).catch(()=>{});

const workRef=collection(db,"work");

/* ELEMENTS */
const date=document.getElementById("date");
const worker=document.getElementById("worker");
const hours=document.getElementById("hours");
const location=document.getElementById("location");
const workdone=document.getElementById("workdone");
const fema=document.getElementById("fema");

const entries=document.getElementById("entries");
const calendar=document.getElementById("calendar");
const totals=document.getElementById("totals");

/* ADD ENTRY */
window.addEntry=async()=>{
await addDoc(workRef,{
date:date.value,
worker:worker.value,
hours:Number(hours.value),
location:location.value,
work:workdone.value,
fema:fema.value
});
};

/* DELETE */
window.deleteEntry=async(id)=>{
if(confirm("Delete entry?"))
await deleteDoc(doc(db,"work",id));
};

/* EDIT */
window.editEntry=async(id,data)=>{
const hrs=prompt("Edit hours",data.hours);
if(hrs===null)return;
await updateDoc(doc(db,"work",id),{hours:Number(hrs)});
};

/* SORTED QUERY */
const q=query(workRef,orderBy("date","asc"));

onSnapshot(q,(snapshot)=>{

entries.innerHTML="";
calendar.innerHTML="";

let equipTotals={
"Dump Truck":0,
"Motor Grader Deere":0,
"Motor Grader Gallion":0,
"Backhoe":0,
"Brush Cutter":0
};

let days={};   // calendar grouping
let femaTotals={};
let totalFema=0;

snapshot.forEach(d=>{

const data=d.data();
const id=d.id;
const hrs=Number(data.hours||0);

/* totals */
if(equipTotals[data.worker]!=undefined)
equipTotals[data.worker]+=hrs;

if(data.fema){
totalFema+=hrs;
femaTotals[data.fema]=(femaTotals[data.fema]||0)+hrs;
}

/* group by day */
if(!days[data.date]) days[data.date]=[];
days[data.date].push({id,data});

/* entry list */
entries.innerHTML+=`
<div class="card">
<b>${data.worker}</b><br>
${data.date} — ${hrs} hrs<br>
${data.location}<br>
${data.work}<br>
FEMA: ${data.fema||"-"}<br><br>

<button onclick='editEntry("${id}",${JSON.stringify(data)})'>Edit</button>
<button onclick='deleteEntry("${id}")'>Delete</button>
</div>`;
});

/* BUILD TRUE CALENDAR */
Object.keys(days).sort().forEach(day=>{

calendar.innerHTML+=`
<div class="dayBlock">
<h3>${day}</h3>
${days[day].map(e=>`
<div class="calEntry">
${e.data.worker}<br>
${e.data.hours} hrs
</div>
`).join("")}
</div>`;
});

/* totals */
let femaHTML="";
for(const n in femaTotals)
femaHTML+=`${n}: ${femaTotals[n]} hrs<br>`;

totals.innerHTML=`
<h3>Equipment Totals</h3>
${Object.entries(equipTotals).map(e=>`${e[0]}: ${e[1]} hrs`).join("<br>")}
<br><br>
<h3>FEMA Totals</h3>
Total FEMA Hours: ${totalFema}<br><br>
<h3>FEMA Breakdown</h3>
${femaHTML||"None"}
`;

});

</script>

<style>

/* BIG MOBILE FRIENDLY UI */

body{
font-family:Arial;
background:#f4f6f8;
margin:15px;
font-size:22px;        /* DOUBLE SIZE TEXT */
}

input,select,button{
width:100%;
padding:18px;
margin:10px 0;
font-size:22px;
border-radius:10px;
}

button{
background:#2c7be5;
color:white;
border:none;
font-weight:bold;
}

.card{
background:white;
padding:18px;
margin:12px 0;
border-radius:12px;
box-shadow:0 3px 8px rgba(0,0,0,.15);
}

/* REAL CALENDAR LOOK */
.dayBlock{
background:white;
margin:12px 0;
padding:15px;
border-radius:14px;
box-shadow:0 3px 8px rgba(0,0,0,.15);
}

.calEntry{
background:#e9f2ff;
padding:10px;
margin:8px 0;
border-radius:8px;
font-size:22px;
}

h2,h3{
font-size:28px;
}

</style>

</head>

<body>

<h2>Roadcrew Work Calendar</h2>

<input type="date" id="date">

<select id="worker">
<option>Dump Truck</option>
<option>Motor Grader Deere</option>
<option>Motor Grader Gallion</option>
<option>Backhoe</option>
<option>Brush Cutter</option>
</select>

<input id="hours" placeholder="Hours Worked">
<input id="location" placeholder="Location">
<input id="workdone" placeholder="Work Performed">
<input id="fema" placeholder="FEMA Number">

<button onclick="addEntry()">Add Entry</button>

<h3>Calendar</h3>
<div id="calendar"></div>

<h3>Entries</h3>
<div id="entries"></div>

<div id="totals"></div>

</body>
</html>
