<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mobile Friendly Project</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#111;
    color:white;
    text-align:center;
}

header{
    padding:15px;
    background:#1f1f1f;
    font-size:20px;
}

.container{
    padding:20px;
}

button{
    width:100%;
    max-width:300px;
    padding:15px;
    margin:10px auto;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#4CAF50;
    color:white;
}

button:active{
    transform:scale(0.96);
}

.card{
    background:#222;
    padding:15px;
    margin-top:15px;
    border-radius:10px;
}
</style>
</head>

<body>

<header>
🚀 Simple Mobile App
</header>

<div class="container">

<button onclick="addItem()">Tap Me</button>

<div id="list"></div>

</div>

<script>

// VERY LIGHTWEIGHT JS
let count = 0;

function addItem(){
    count++;

    const div = document.createElement("div");
    div.className = "card";
    div.textContent = "Item #" + count;

    document.getElementById("list").prepend(div);
}

</script>

</body>
</html>
