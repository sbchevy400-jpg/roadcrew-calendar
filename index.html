<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Roadcrew Work Calendar</title>

<style>
body{
font-family:Arial;
background:#f4f6f8;
text-align:center;
padding:20px;
}
input{
display:block;
margin:8px auto;
padding:10px;
width:90%;
max-width:320px;
}
button{
padding:12px;
background:#2c3e50;
color:white;
border:none;
border-radius:6px;
}
.entry{
background:white;
margin:10px auto;
padding:10px;
border-radius:8px;
max-width:350px;
}
</style>
</head>

<body>

<h2>Ozark Township Roadcrew Calendar</h2>

<input id="worker" placeholder="Worker Name">
<input id="hours" type="number" placeholder="Hours Worked">
<input id="location" placeholder="Work Location">
<input id="workdone" placeholder="Work Completed">
<input id="fema" placeholder="FEMA Number">
<input id="date" type="date">

<button id="saveBtn">Save Work Entry</button>

<div id="entries"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
onSnapshot,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyArv5V1_8ZQoN3fe3OJ35Fl-7PbEKzkDYo",
authDomain: "roadcrew-work-calendar.firebaseapp.com",
projectId: "roadcrew-work-calendar",
storageBucket: "roadcrew-work-calendar.firebasestorage.app",
messagingSenderId: "373087389663",
appId: "1:373087389663:web:a55368e82fcd1942ade66a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById("saveBtn").onclick = async () => {

await addDoc(collection(db,"work"),{
worker:document.getElementById("worker").value,
hours:document.getElementById("hours").value,
location:document.getElementById("location").value,
work:document.getElementById("workdone").value,
fema:document.getElementById("fema").value,
date:document.getElementById("date").value,
created:Date.now()
});

};

const q = query(collection(db,"work"), orderBy("created","desc"));

onSnapshot(q,(snapshot)=>{
const entries = document.getElementById("entries");
entries.innerHTML="";
snapshot.forEach(doc=>{
const d = doc.data();
entries.innerHTML += `
<div class="entry">
<b>${d.worker}</b><br>
${d.date} — ${d.hours} hrs<br>
${d.location}<br>
${d.work}<br>
FEMA: ${d.fema}
</div>`;
});
});

</script>

</body>
</html>
